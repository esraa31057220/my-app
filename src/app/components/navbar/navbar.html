<nav class="navbar">
  <!-- LOGO -->
  <a routerLink="/home" class="logo">ShopHub</a>

  <!-- CATEGORIES -->
  @if (authService.isLoggedIn()) {
    <div class="nav-categories">
      <a routerLink="/home">Home</a>
    </div>
  }

  <!-- GUEST -->
  @if (!authService.isLoggedIn()) {
    <div class="nav-links guest">
      <a routerLink="/login">Sign in</a>
      <a routerLink="/register">Get started</a>
    </div>
  }

  <!-- LOGGED IN -->
  @if (authService.isLoggedIn()) {
    <div class="nav-links">
      <a
        routerLink="/my-orders"
        routerLinkActive="active"
        class="orders-link"
        aria-label="My Orders"
      >
        <svg
          width="18"
          height="18"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
        >
          <path
            d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"
          />
          <polyline points="3.27 6.96 12 12.01 20.73 6.96" />
          <line x1="12" y1="22.08" x2="12" y2="12" />
        </svg>
      </a>
      <!-- Cart -->
      <a routerLink="/cart" class="cart-link" aria-label="Cart">
        <svg
          width="18"
          height="18"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
        >
          <path d="M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z" />
          <line x1="3" y1="6" x2="21" y2="6" />
          <path d="M16 10a4 4 0 0 1-8 0" />
        </svg>
        @if (cartItemCount > 0) {
          <span class="cart-badge">{{ cartItemCount }}</span>
        }
      </a>

      <!-- Profile -->
      <a routerLink="/profile" class="profile-link" aria-label="Account">
        <svg
          width="18"
          height="18"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
        >
          <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2" />
          <circle cx="12" cy="7" r="4" />
        </svg>
      </a>

      <!-- ADMIN -->
      @if (authService.isAdmin()) {
        <div class="nav-divider"></div>
        <div class="admin-links">
          <a routerLink="/admin/users" routerLinkActive="active">👥 Users</a>
          <a routerLink="/admin/dashboard" routerLinkActive="active">📊 Dashboard</a>
        </div>
      }

      <div class="nav-divider"></div>

      <button class="btn-logout" (click)="logout()">Logout</button>
    </div>
  }
</nav>
