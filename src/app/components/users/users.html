<div class="users-container">
  <div class="page-header">
    <h1 class="page-title">Users</h1>
    <span class="page-count">{{ users.length }} users</span>
  </div>

  <!-- Form -->
  <div class="form-card">
    <p class="form-title">{{ isEditing ? 'Edit user' : 'Add user' }}</p>
    <div class="form-grid">
      <input [(ngModel)]="formUser.firstName" placeholder="First name" />
      <input [(ngModel)]="formUser.lastName" placeholder="Last name" />
      <input [(ngModel)]="formUser.email" placeholder="Email address" />
      <select [(ngModel)]="formUser.role" class="full-width">
        <option value="Customer">Customer</option>
        <option value="Seller">Seller</option>
        <option value="Admin">Admin</option>
      </select>
      <input [(ngModel)]="formUser.password" placeholder="Password" type="password" />
    </div>
    <div class="form-actions">
      <button class="btn-primary" (click)="onSubmit()">
        {{ isEditing ? 'Update' : 'Add user' }}
      </button>
      <button *ngIf="isEditing" class="btn-cancel" (click)="resetForm()">Cancel</button>
    </div>
  </div>

  <!-- List -->
  <ul class="users-list">
    <li *ngFor="let user of users" class="user-card">
      <div class="user-avatar">
        {{ user.firstName.charAt(0).toUpperCase() }}{{ user.lastName.charAt(0).toUpperCase() }}
      </div>
      <div class="user-info">
        <p class="user-name">{{ user.firstName }} {{ user.lastName }}</p>
        <p class="user-email">{{ user.email }}</p>
        <span class="user-role" [class.admin]="user.role === 'Admin'">
          {{ user.role }}
        </span>
      </div>
      <div class="user-actions">
        <button class="btn-edit" (click)="editUser(user)">
          <i class="ti ti-edit"></i>
        </button>
        <button class="btn-delete" (click)="deleteUser(user.id!)">
          <i class="ti ti-trash"></i>
        </button>
      </div>
    </li>
  </ul>
</div>
